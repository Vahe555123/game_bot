name: Deploy to VPS

on:
  push:
    branches:
      - main

concurrency:
  group: game-bot2-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Validate SSH deploy secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -e

          missing=0
          for var in VPS_HOST VPS_USER VPS_PORT VPS_SSH_KEY; do
            if [ -z "${!var}" ]; then
              echo "::error::Missing required secret: $var"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          if ! printf '%s' "$VPS_SSH_KEY" | grep -q "BEGIN .*PRIVATE KEY"; then
            echo "::error::VPS_SSH_KEY must contain the full private SSH key, not the .pub key"
            exit 1
          fi

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            cd /home/deploy/apps/game_bot2
            mkdir -p /home/deploy/backups/game_bot2
            pm2 stop game_bot2 || true

            if [ -n "$(git status --porcelain -- products.db)" ]; then
              backup_suffix="$(date +%F-%H%M%S)"
              [ -f products.db ] && cp products.db "/home/deploy/backups/game_bot2/products.db.${backup_suffix}"
              [ -f products.db-wal ] && cp products.db-wal "/home/deploy/backups/game_bot2/products.db-wal.${backup_suffix}"
              [ -f products.db-shm ] && cp products.db-shm "/home/deploy/backups/game_bot2/products.db-shm.${backup_suffix}"
              rm -f products.db-wal products.db-shm
              git restore --staged --worktree products.db
            fi

            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            # Опционально: в GitHub → Settings → Secrets and variables → Actions → Variables
            # задайте SQLITE_SKIP_FTS_REBUILD_ON_STARTUP = true — чтобы первый старт после деплоя
            # не ждал пересборку FTS (поиск может быть неполным до следующего рестарта без флага).
            # Оставьте переменную пустой — обычная пересборка индекса (после фикса в connection.py она быстрая).
            export SQLITE_SKIP_FTS_REBUILD_ON_STARTUP="${{ vars.SQLITE_SKIP_FTS_REBUILD_ON_STARTUP }}"

            SKIP_GIT_UPDATE=true SKIP_FRONTEND_BUILD=true bash scripts/deploy_server.sh

      - name: Upload frontend dist
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          port: ${{ secrets.VPS_PORT }}
          source: "frontend/dist/*"
          target: "/home/deploy/apps/game_bot2/frontend/dist/"
          strip_components: 2
