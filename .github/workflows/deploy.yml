name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Validate SSH deploy secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -e

          missing=0
          for var in VPS_HOST VPS_USER VPS_PORT VPS_SSH_KEY; do
            if [ -z "${!var}" ]; then
              echo "::error::Missing required secret: $var"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          if ! printf '%s' "$VPS_SSH_KEY" | grep -q "BEGIN .*PRIVATE KEY"; then
            echo "::error::VPS_SSH_KEY must contain the full private SSH key, not the .pub key"
            exit 1
          fi

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            cd /home/deploy/apps/game_bot2
            git fetch origin main
            git reset --hard origin/main

            if [ ! -d ".venv" ]; then
              python3 -m venv .venv
            fi

            .venv/bin/pip install --upgrade pip
            .venv/bin/pip install -r requirements.txt
            chmod +x start_pm2.sh

            pm2 startOrReload ecosystem.config.cjs --only game_bot2 --update-env
            pm2 save
            pm2 show game_bot2
